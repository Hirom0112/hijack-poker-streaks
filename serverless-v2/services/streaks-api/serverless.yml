service: streaks-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  memorySize: 256
  timeout: 30
  environment:
    STAGE: ${self:provider.stage}

functions:
  api:
    handler: handler.api
    events:
      - httpApi: '*'

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    exclude:
      - '@aws-sdk/*'
      # winston is pulled in via shared/config/logger.js (require('winston')).
      # esbuild can't resolve it from the shared dir, so keep it external; it
      # resolves from streaks-api/node_modules at runtime.
      - 'winston'
